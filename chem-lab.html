<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 化学元素自动化实验室</title>
    <style>
        :root {
            --bg: #0a0e14;
            --panel-bg: #131820;
            --border: #1e2a3a;
            --text: #c8d6e5;
            --text-bright: #e8f0f8;
            --accent: #00d4aa;
            --accent2: #ff6b9d;
            --gold: #f0c040;
            --nonmetal: #4ade80;
            --alkali: #f87171;
            --alkaline: #fb923c;
            --transition: #60a5fa;
            --halogen: #facc15;
            --noble: #c084fc;
            --metalloid: #34d399;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --glow: 0 0 20px rgba(0, 212, 170, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(0, 180, 140, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(100, 140, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 100, 140, 0.04) 0%, transparent 50%);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 粒子背景 */
        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.5;
            }
            85% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 10px 14px 30px;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 18px 10px 10px;
            position: relative;
        }
        .header h1 {
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #00d4aa, #60c8ff, #b088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: #6b7d95;
            letter-spacing: 0.06em;
        }
        .science-display {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--panel-bg);
            border: 1px solid #2a3a55;
            border-radius: 30px;
            padding: 8px 18px;
            margin-top: 8px;
            box-shadow: var(--glow);
            font-weight: 600;
            font-size: 1rem;
            color: #f0c040;
        }
        .science-display .icon {
            font-size: 1.3rem;
        }
        .science-display .val {
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 40px;
            text-align: center;
            transition: all 0.2s;
        }
        .science-display.pulse .val {
            animation: pulseGold 0.5s ease-out;
        }
        @keyframes pulseGold {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.35);
                color: #fff;
            }
        }

        /* 主布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 14px;
            margin-top: 10px;
            align-items: start;
        }
        @media (max-width: 1050px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
            .main-grid .right-panel {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .main-grid .right-panel .panel-full {
                grid-column: 1 / -1;
            }
        }
        @media (max-width: 680px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .main-grid .right-panel {
                grid-template-columns: 1fr;
            }
        }

        /* 面板 */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--card-shadow);
            transition: border-color 0.4s;
            position: relative;
            overflow: hidden;
        }
        .panel:hover {
            border-color: #2a4a65;
        }
        .panel h3 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 12px;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .panel h3 .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.active {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }
        .dot.warn {
            background: #f0c040;
            box-shadow: 0 0 8px #f0c040;
        }

        /* 周期表 */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        .pt-element {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            border: 2px solid transparent;
            background: #1a2232;
            color: #4a5568;
            min-width: 36px;
            text-align: center;
        }
        .pt-element .num {
            font-size: 0.5rem;
            opacity: 0.7;
            line-height: 1;
        }
        .pt-element .sym {
            font-size: 0.85rem;
            line-height: 1.1;
        }
        .pt-element.unlocked {
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
            box-shadow: 0 0 12px rgba(100, 200, 180, 0.3);
        }
        .pt-element.unlocked.nonmetal {
            background: #1a3a2a;
            border-color: #4ade80;
            box-shadow: 0 0 14px rgba(74, 222, 128, 0.35);
        }
        .pt-element.unlocked.alkali {
            background: #3a1a1a;
            border-color: #f87171;
            box-shadow: 0 0 14px rgba(248, 113, 113, 0.35);
        }
        .pt-element.unlocked.halogen {
            background: #3a3510;
            border-color: #facc15;
            box-shadow: 0 0 14px rgba(250, 204, 21, 0.35);
        }
        .pt-element.unlocked.metalloid {
            background: #1a3028;
            border-color: #34d399;
            box-shadow: 0 0 14px rgba(52, 211, 153, 0.35);
        }
        .pt-element.unlocked.transition-metal {
            background: #1a2a3a;
            border-color: #60a5fa;
            box-shadow: 0 0 14px rgba(96, 165, 250, 0.35);
        }
        .pt-element:hover {
            transform: translateY(-3px);
            z-index: 3;
        }
        .pt-element.unlocked:hover {
            filter: brightness(1.4);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.3);
        }
        .pt-element.producing {
            animation: elementPulse 1.2s ease-in-out infinite;
        }
        @keyframes elementPulse {
            0%,
            100% {
                box-shadow: 0 0 8px currentColor;
            }
            50% {
                box-shadow: 0 0 22px currentColor, 0 0 35px currentColor;
            }
        }
        .pt-empty {
            aspect-ratio: 1/1;
        }

        /* 元素库存行 */
        .element-stock-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .stock-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a2232;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #2a3a50;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stock-chip:hover {
            background: #222d40;
            border-color: #4a6080;
        }
        .stock-chip .sym {
            font-weight: 700;
            font-size: 0.8rem;
        }
        .stock-chip .count {
            color: #a0b8d0;
            min-width: 28px;
            text-align: right;
            transition: all 0.15s;
        }
        .stock-chip.flash .count {
            color: #fff;
            transform: scale(1.2);
        }

        /* 生成器卡片 */
        .generator-card {
            background: #181f2c;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid #232d3d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: all 0.25s;
        }
        .generator-card:hover {
            border-color: #3a5070;
            background: #1c2432;
        }
        .gen-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .gen-symbol {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .gen-symbol.nonmetal {
            background: #1a3a2a;
            color: #4ade80;
            border: 2px solid #4ade80;
        }
        .gen-symbol.alkali {
            background: #3a1a1a;
            color: #f87171;
            border: 2px solid #f87171;
        }
        .gen-symbol.halogen {
            background: #3a3510;
            color: #facc15;
            border: 2px solid #facc15;
        }
        .gen-symbol.metalloid {
            background: #1a3028;
            color: #34d399;
            border: 2px solid #34d399;
        }
        .gen-detail {
            line-height: 1.3;
        }
        .gen-detail .name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #d0dce8;
        }
        .gen-detail .rate {
            font-size: 0.7rem;
            color: #7a8ea0;
        }
        .gen-upgrade-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid #3a5068;
            background: #1e2a3a;
            color: #b0c8d8;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .gen-upgrade-btn:hover {
            background: #263548;
            border-color: #5a80a8;
            color: #fff;
            box-shadow: 0 0 14px rgba(100, 160, 220, 0.25);
        }
        .gen-upgrade-btn:active {
            transform: scale(0.94);
            transition: transform 0.08s;
        }
        .gen-upgrade-btn.affordable {
            border-color: #4ade80;
            color: #4ade80;
            animation: subtleGlow 1.5s ease-in-out infinite;
        }
        @keyframes subtleGlow {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(74, 222, 128, 0.25);
            }
            50% {
                box-shadow: 0 0 18px rgba(74, 222, 128, 0.5);
            }
        }
        .gen-upgrade-btn.maxed {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #3a4050;
            color: #5a6070;
        }

        /* 反应面板 */
        .reaction-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: #181f2c;
            border-radius: 10px;
            border: 1px solid #232d3d;
            font-size: 0.78rem;
            flex-wrap: wrap;
            transition: all 0.3s;
        }
        .reaction-row.reacting {
            border-color: #f0c040 !important;
            box-shadow: 0 0 16px rgba(240, 192, 64, 0.3) !important;
            animation: reactFlash 0.6s ease-out;
        }
        @keyframes reactFlash {
            0% {
                background: #2a2510;
                box-shadow: 0 0 30px rgba(240, 192, 64, 0.7);
            }
            100% {
                background: #181f2c;
                box-shadow: 0 0 0px rgba(240, 192, 64, 0);
            }
        }
        .reaction-arrow {
            color: #6b8aa0;
            font-weight: 700;
        }
        .reaction-output {
            font-weight: 700;
            color: #f0c040;
            margin-left: auto;
            font-size: 0.8rem;
        }
        .cooldown-bar {
            width: 100%;
            height: 3px;
            background: #1a2a3a;
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }
        .cooldown-bar .fill {
            height: 100%;
            background: #4ade80;
            border-radius: 2px;
            transition: width 0.3s linear;
        }
        .cooldown-bar .fill.cooling {
            background: #f0c040;
        }

        /* 化合物面板 */
        .compound-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #1a2232;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #2a3a50;
            margin: 3px;
            transition: all 0.2s;
        }
        .compound-chip .formula {
            font-weight: 700;
            color: #f0c040;
            letter-spacing: 0.04em;
        }
        .compound-chip .val {
            color: #8aa0b8;
        }

        /* 按钮 */
        .btn {
            padding: 9px 18px;
            border-radius: 24px;
            border: 1px solid #3a5068;
            background: #1e2a3a;
            color: #c0d0e0;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.03em;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background: #263548;
            border-color: #5a80a8;
            color: #fff;
        }
        .btn.accent {
            border-color: #00d4aa;
            color: #00d4aa;
            background: #0d2a24;
        }
        .btn.accent:hover {
            background: #0f382e;
            box-shadow: 0 0 18px rgba(0, 212, 170, 0.35);
        }
        .btn:active {
            transform: scale(0.94);
            transition: transform 0.08s;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 研究树 */
        .research-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #181f2c;
            border-radius: 10px;
            border: 1px solid #232d3d;
            transition: all 0.25s;
        }
        .research-item.researched {
            border-color: #4ade80;
            background: #132018;
            opacity: 0.8;
        }
        .research-item .info {
            line-height: 1.3;
        }
        .research-item .info .title {
            font-weight: 600;
            font-size: 0.82rem;
            color: #d0dce8;
        }
        .research-item .info .desc {
            font-size: 0.7rem;
            color: #7a8ea0;
        }

        /* 日志 */
        .log-area {
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.7rem;
            color: #6b8095;
            line-height: 1.6;
            padding-right: 6px;
        }
        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: #2a3a50;
            border-radius: 3px;
        }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #151d28;
            animation: fadeInLog 0.4s ease-out;
        }
        @keyframes fadeInLog {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .log-entry .highlight {
            color: #f0c040;
            font-weight: 600;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1a3028;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 10px 22px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.85rem;
            animation: toastIn 0.4s ease-out, toastOut 0.4s 1.8s ease-in forwards;
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
            white-space: nowrap;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-15px);
            }
        }

        /* 响应式 */
        @media (max-width: 680px) {
            .periodic-table {
                grid-template-columns: repeat(8, 1fr);
                gap: 2px;
            }
            .pt-element {
                font-size: 0.65rem;
                border-radius: 5px;
                min-width: 28px;
            }
            .pt-element .sym {
                font-size: 0.65rem;
            }
            .pt-element .num {
                font-size: 0.4rem;
            }
            .generator-card {
                flex-wrap: wrap;
            }
            .panel {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景粒子 -->
    <div class="particles-bg" id="particlesBg"></div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>⚗️ 元素自动化实验室</h1>
            <p class="subtitle">收集元素 · 触发反应 · 解锁周期表</p>
            <div class="science-display" id="scienceDisplay">
                <span class="icon">🔬</span>
                <span>科学点数</span>
                <span class="val" id="sciencePoints">0</span>
            </div>
        </div>

        <!-- 主布局 -->
        <div class="main-grid">
            <!-- 左面板：周期表 + 元素库存 -->
            <div class="panel left-panel">
                <h3><span class="dot active"></span> 元素周期表 <span style="font-size:0.7rem;color:#6b7d95;">(点击元素手动采集)</span></h3>
                <div class="periodic-table" id="periodicTable"></div>
                <div style="margin-top:10px;">
                    <small style="color:#5a7088;">📦 元素库存（点击周期表或下方芯片手动+1）</small>
                    <div class="element-stock-row" id="elementStocks"></div>
                </div>
            </div>

            <!-- 中间面板：生成器 + 反应 -->
            <div class="panel center-panel">
                <h3><span class="dot active"></span> 自动生成器</h3>
                <div id="generatorsList"></div>
                <hr style="border-color:#1e2a3a;margin:12px 0;">
                <h3><span class="dot warn"></span> 化学反应（自动触发）</h3>
                <div id="reactionsList"></div>
            </div>

            <!-- 右面板：化合物 + 研究 + 日志 -->
            <div class="right-panel">
                <div class="panel">
                    <h3>🧪 化合物库存</h3>
                    <div id="compoundsList" style="min-height:40px;"></div>
                    <button class="btn accent" id="btnAnalyzeAll" style="margin-top:8px;width:100%;">
                        ⚡ 一键分析（转化为科学点数）
                    </button>
                    <small style="color:#5a7088;display:block;margin-top:4px;">💡 购买"自动分析仪"后自动转化</small>
                </div>
                <div class="panel panel-full">
                    <h3>🔬 研究升级</h3>
                    <div id="researchList"></div>
                </div>
                <div class="panel panel-full">
                    <h3>📜 实验日志</h3>
                    <div class="log-area" id="logArea">
                        <div class="log-entry">🟢 实验室启动...基础元素就绪。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 粒子背景 ====================
            const particlesBg = document.getElementById('particlesBg');
            const particleColors = ['#4ade80', '#60a5fa', '#f0c040', '#f87171', '#c084fc', '#34d399', '#00d4aa',
            '#ff6b9d'];
            for (let i = 0; i < 45; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.cssText = `
                    width:${size}px;height:${size}px;
                    left:${Math.random()*100}%;
                    background:${particleColors[Math.floor(Math.random()*particleColors.length)]};
                    animation-duration:${Math.random()*14+8}s;
                    animation-delay:${Math.random()*12}s;
                    box-shadow:0 0 ${size*2}px currentColor;
                `;
                particlesBg.appendChild(p);
            }

            // ==================== 数据定义 ====================
            // 元素定义：符号, 名称, 原子序数, 分类, 周期表位置(col,row) 1-indexed
            const elementDefs = [
                { sym: 'H', name: '氢', num: 1, cat: 'nonmetal', col: 1, row: 1, initUnlocked: true },
                { sym: 'He', name: '氦', num: 2, cat: 'noble', col: 8, row: 1, initUnlocked: false },
                { sym: 'Li', name: '锂', num: 3, cat: 'alkali', col: 1, row: 2, initUnlocked: false },
                { sym: 'Be', name: '铍', num: 4, cat: 'alkaline', col: 2, row: 2, initUnlocked: false },
                { sym: 'B', name: '硼', num: 5, cat: 'metalloid', col: 3, row: 2, initUnlocked: false },
                { sym: 'C', name: '碳', num: 6, cat: 'nonmetal', col: 4, row: 2, initUnlocked: true },
                { sym: 'N', name: '氮', num: 7, cat: 'nonmetal', col: 5, row: 2, initUnlocked: true },
                { sym: 'O', name: '氧', num: 8, cat: 'nonmetal', col: 6, row: 2, initUnlocked: true },
                { sym: 'F', name: '氟', num: 9, cat: 'halogen', col: 7, row: 2, initUnlocked: false },
                { sym: 'Ne', name: '氖', num: 10, cat: 'noble', col: 8, row: 2, initUnlocked: false },
                { sym: 'Na', name: '钠', num: 11, cat: 'alkali', col: 1, row: 3, initUnlocked: false },
                { sym: 'Mg', name: '镁', num: 12, cat: 'alkaline', col: 2, row: 3, initUnlocked: false },
                { sym: 'Al', name: '铝', num: 13, cat: 'transition-metal', col: 3, row: 3, initUnlocked: false },
                { sym: 'Si', name: '硅', num: 14, cat: 'metalloid', col: 4, row: 3, initUnlocked: false },
                { sym: 'P', name: '磷', num: 15, cat: 'nonmetal', col: 5, row: 3, initUnlocked: false },
                { sym: 'S', name: '硫', num: 16, cat: 'nonmetal', col: 6, row: 3, initUnlocked: false },
                { sym: 'Cl', name: '氯', num: 17, cat: 'halogen', col: 7, row: 3, initUnlocked: false },
                { sym: 'Ar', name: '氩', num: 18, cat: 'noble', col: 8, row: 3, initUnlocked: false },
            ];

            // 反应定义
            const reactionDefs = [
                { id: 'H2O', inputs: { H: 2, O: 1 }, outputCompound: 'H2O', outputAmount: 1, cooldown: 2.5,
                    name: '2H + O → H₂O（水）' },
                { id: 'CO2', inputs: { C: 1, O: 2 }, outputCompound: 'CO2', outputAmount: 1, cooldown: 3.0,
                    name: 'C + 2O → CO₂（二氧化碳）' },
                { id: 'NH3', inputs: { H: 3, N: 1 }, outputCompound: 'NH3', outputAmount: 1, cooldown: 3.5,
                    name: '3H + N → NH₃（氨）' },
                { id: 'NaCl', inputs: { Na: 1, Cl: 1 }, outputCompound: 'NaCl', outputAmount: 1, cooldown: 2.0,
                    name: 'Na + Cl → NaCl（盐）', requireUnlocked: ['Na', 'Cl'] },
                { id: 'SiO2', inputs: { Si: 1, O: 2 }, outputCompound: 'SiO2', outputAmount: 1, cooldown: 3.0,
                    name: 'Si + 2O → SiO₂（石英）', requireUnlocked: ['Si'] },
                { id: 'H2CO3', inputs: { H2O: 1, CO2: 1 }, outputCompound: 'H2CO3', outputAmount: 1, cooldown: 4.0,
                    name: 'H₂O + CO₂ → H₂CO₃（碳酸）' },
            ];

            // 化合物定义
            const compoundDefs = {
                'H2O': { name: '水', scienceValue: 1, emoji: '💧' },
                'CO2': { name: '二氧化碳', scienceValue: 2, emoji: '🫧' },
                'NH3': { name: '氨', scienceValue: 3, emoji: '🧴' },
                'NaCl': { name: '氯化钠(盐)', scienceValue: 5, emoji: '🧂' },
                'SiO2': { name: '二氧化硅(石英)', scienceValue: 4, emoji: '💎' },
                'H2CO3': { name: '碳酸', scienceValue: 6, emoji: '🥤' },
            };

            // 研究定义
            const researchDefs = [
                { id: 'unlockNa', name: '解锁钠(Na)', desc: '发现碱金属钠元素', cost: 60, effect: 'unlock_element',
                    target: 'Na', icon: '🧂' },
                { id: 'unlockCl', name: '解锁氯(Cl)', desc: '发现卤素氯元素', cost: 80, effect: 'unlock_element', target: 'Cl',
                    icon: '🟡' },
                { id: 'unlockSi', name: '解锁硅(Si)', desc: '发现类金属硅元素', cost: 100, effect: 'unlock_element',
                    target: 'Si', icon: '🔶' },
                { id: 'catalyst1', name: '反应催化剂 I', desc: '所有反应冷却时间 -20%', cost: 120, effect: 'cooldown_reduction',
                    value: 0.20, icon: '⚡' },
                { id: 'autoAnalyzer', name: '自动分析仪', desc: '每秒自动将1个化合物转化为科学点数', cost: 150, effect: 'auto_analyze',
                    icon: '🤖' },
                { id: 'catalyst2', name: '反应催化剂 II', desc: '所有反应冷却时间再 -25%', cost: 250, effect: 'cooldown_reduction',
                    value: 0.25, icon: '⚡⚡' },
                { id: 'genBooster', name: '生成加速器', desc: '所有元素自动生产速率 +60%', cost: 300, effect: 'gen_boost',
                    value: 0.60, icon: '🚀' },
                { id: 'autoAnalyzer2', name: '高级分析仪', desc: '自动分析速率提升至每秒3个化合物', cost: 400, effect: 'auto_analyze_upgrade',
                    icon: '🤖➕' },
            ];

            // ==================== 游戏状态 ====================
            const state = {
                elements: {}, // { sym: { count: float, unlocked: bool, genLevel: int } }
                compounds: {}, // { id: count }
                reactions: {}, // { id: { cooldownRemaining: float } }
                sciencePoints: 0,
                researchCompleted: new Set(),
                autoAnalyzeRate: 0, // 每秒自动分析化合物数量
                cooldownMultiplier: 1.0,
                genBoostMultiplier: 0,
                totalReactionsTriggered: 0,
                logLines: [],
            };

            // 初始化元素状态
            elementDefs.forEach(def => {
                state.elements[def.sym] = {
                    count: def.initUnlocked ? 3 : 0,
                    unlocked: def.initUnlocked,
                    genLevel: 0, // 生成器等级（0=无自动生成）
                    cat: def.cat,
                };
            });

            // 初始化化合物
            Object.keys(compoundDefs).forEach(cid => {
                state.compounds[cid] = 0;
            });

            // 初始化反应冷却
            reactionDefs.forEach(r => {
                state.reactions[r.id] = { cooldownRemaining: 0 };
            });

            // ==================== DOM引用缓存 ====================
            const $sciencePoints = document.getElementById('sciencePoints');
            const $scienceDisplay = document.getElementById('scienceDisplay');
            const $periodicTable = document.getElementById('periodicTable');
            const $elementStocks = document.getElementById('elementStocks');
            const $generatorsList = document.getElementById('generatorsList');
            const $reactionsList = document.getElementById('reactionsList');
            const $compoundsList = document.getElementById('compoundsList');
            const $researchList = document.getElementById('researchList');
            const $logArea = document.getElementById('logArea');
            const $btnAnalyzeAll = document.getElementById('btnAnalyzeAll');
            const $toastContainer = document.getElementById('toastContainer');

            // ==================== 辅助函数 ====================
            function getGenCost(sym) {
                const level = state.elements[sym].genLevel;
                return Math.floor(5 * Math.pow(2.2, level));
            }
            function getGenRate(sym) {
                const level = state.elements[sym].genLevel;
                if (level === 0) return 0;
                const base = Math.pow(2, level - 1);
                return base * (1 + state.genBoostMultiplier);
            }
            function getReactionCooldown(reactionId) {
                const def = reactionDefs.find(r => r.id === reactionId);
                if (!def) return 3;
                return def.cooldown * state.cooldownMultiplier;
            }
            function canTriggerReaction(reactionId) {
                const def = reactionDefs.find(r => r.id === reactionId);
                if (!def) return false;
                // 检查前置解锁
                if (def.requireUnlocked) {
                    for (const sym of def.requireUnlocked) {
                        if (!state.elements[sym] || !state.elements[sym].unlocked) return false;
                    }
                }
                // 检查输入资源
                for (const [key, amt] of Object.entries(def.inputs)) {
                    const available = key.length <= 2 ? (state.elements[key]?.count || 0) : (state.compounds[
                        key] || 0);
                    if (available < amt) return false;
                }
                // 检查冷却
                if (state.reactions[reactionId]?.cooldownRemaining > 0) return false;
                return true;
            }
            function triggerReaction(reactionId) {
                const def = reactionDefs.find(r => r.id === reactionId);
                if (!def || !canTriggerReaction(reactionId)) return false;
                // 消耗输入
                for (const [key, amt] of Object.entries(def.inputs)) {
                    if (key.length <= 2) {
                        state.elements[key].count -= amt;
                    } else {
                        state.compounds[key] -= amt;
                    }
                }
                // 产生输出
                state.compounds[def.outputCompound] = (state.compounds[def.outputCompound] || 0) + def.outputAmount;
                // 设置冷却
                state.reactions[reactionId].cooldownRemaining = getReactionCooldown(reactionId);
                state.totalReactionsTriggered++;
                // 日志
                addLog(`⚗️ 反应触发：<span class="highlight">${def.name}</span> → +${def.outputAmount} ${def.outputCompound}`);
                // 动画标记
                flashReactionRow(reactionId);
                return true;
            }
            function addLog(msg) {
                state.logLines.unshift(msg);
                if (state.logLines.length > 60) state.logLines.length = 60;
            }
            function showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                $toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 2400);
            }
            function pulseScienceDisplay() {
                $scienceDisplay.classList.add('pulse');
                setTimeout(() => $scienceDisplay.classList.remove('pulse'), 500);
            }
            let flashedReactions = {};
            function flashReactionRow(reactionId) {
                flashedReactions[reactionId] = true;
                setTimeout(() => { flashedReactions[reactionId] = false;
                    renderReactions(); }, 700);
            }

            // ==================== 渲染函数 ====================
            function renderPeriodicTable() {
                // 创建8列网格，填充元素到正确位置
                const grid = [];
                const maxRows = 3;
                const maxCols = 8;
                // 初始化空网格
                for (let r = 0; r < maxRows; r++) {
                    grid[r] = [];
                    for (let c = 0; c < maxCols; c++) {
                        grid[r][c] = null;
                    }
                }
                // 放置元素
                elementDefs.forEach(def => {
                    const r = def.row - 1;
                    const c = def.col - 1;
                    if (r < maxRows && c < maxCols) {
                        grid[r][c] = def;
                    }
                });
                // 渲染
                let html = '';
                for (let r = 0; r < maxRows; r++) {
                    for (let c = 0; c < maxCols; c++) {
                        const def = grid[r][c];
                        if (def) {
                            const elState = state.elements[def.sym];
                            const unlocked = elState?.unlocked;
                            const producing = unlocked && elState.genLevel > 0;
                            const catClass = unlocked ? def.cat : '';
                            html += `
                            <div class="pt-element ${unlocked ? 'unlocked ' + catClass : ''} ${producing ? 'producing' : ''}"
                                 data-sym="${def.sym}"
                                 title="${def.name}(${def.sym}) - 原子序数${def.num}${unlocked ? ' ✅已解锁' : ' 🔒未发现'} | 库存: ${Math.floor(elState?.count||0)}">
                                <span class="num">${def.num}</span>
                                <span class="sym">${def.sym}</span>
                            </div>`;
                        } else {
                            html += '<div class="pt-empty"></div>';
                        }
                    }
                }
                $periodicTable.innerHTML = html;

                // 绑定点击事件
                $periodicTable.querySelectorAll('.pt-element.unlocked').forEach(el => {
                    el.addEventListener('click', () => {
                        const sym = el.dataset.sym;
                        if (sym && state.elements[sym]?.unlocked) {
                            state.elements[sym].count += 1;
                            addLog(`👆 手动采集：${sym}（${elementDefs.find(d=>d.sym===sym)?.name||sym}）+1`);
                            flashStockChip(sym);
                            renderAll();
                        }
                    });
                });
            }

            function renderElementStocks() {
                let html = '';
                const unlockedElements = elementDefs.filter(d => state.elements[d.sym]?.unlocked);
                unlockedElements.forEach(def => {
                    const count = state.elements[def.sym].count;
                    html += `
                    <span class="stock-chip" data-sym="${def.sym}" title="点击手动采集${def.name}">
                        <span class="sym" style="color:${getCatColor(def.cat)}">${def.sym}</span>
                        <span class="count">${formatNumber(count)}</span>
                    </span>`;
                });
                $elementStocks.innerHTML = html || '<span style="color:#5a7088;">暂无已解锁元素</span>';

                // 绑定点击
                $elementStocks.querySelectorAll('.stock-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const sym = chip.dataset.sym;
                        if (sym && state.elements[sym]?.unlocked) {
                            state.elements[sym].count += 1;
                            addLog(`👆 手动采集：${sym} +1`);
                            flashStockChip(sym);
                            renderAll();
                        }
                    });
                });
            }
            let flashedStocks = {};
            function flashStockChip(sym) {
                flashedStocks[sym] = true;
                setTimeout(() => { flashedStocks[sym] = false;
                    renderElementStocks(); }, 300);
                renderElementStocks();
            }

            function renderGenerators() {
                let html = '';
                const unlockedElements = elementDefs.filter(d => state.elements[d.sym]?.unlocked);
                unlockedElements.forEach(def => {
                    const sym = def.sym;
                    const elState = state.elements[sym];
                    const level = elState.genLevel;
                    const rate = getGenRate(sym);
                    const cost = getGenCost(sym);
                    const affordable = elState.count >= cost;
                    const maxLevel = 12;
                    const isMaxed = level >= maxLevel;
                    html += `
                    <div class="generator-card">
                        <div class="gen-info">
                            <div class="gen-symbol ${def.cat}">${sym}</div>
                            <div class="gen-detail">
                                <div class="name">${def.name} 生成器 <small style="color:#7a8ea0;">Lv${level}</small></div>
                                <div class="rate">⚡ ${rate.toFixed(1)} 个/秒</div>
                            </div>
                        </div>
                        ${isMaxed ?
                            '<span class="gen-upgrade-btn maxed">已满级</span>' :
                            `<button class="gen-upgrade-btn ${affordable ? 'affordable' : ''}"
                                    data-sym="${sym}"
                                    ${!affordable ? 'disabled' : ''}>
                                升级 💰${cost} ${sym}
                            </button>`
                        }
                    </div>`;
                });
                $generatorsList.innerHTML = html || '<p style="color:#5a7088;">暂无已解锁元素</p>';

                // 绑定升级按钮
                $generatorsList.querySelectorAll('.gen-upgrade-btn:not(.maxed)').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const sym = btn.dataset.sym;
                        const cost = getGenCost(sym);
                        if (state.elements[sym].count >= cost && state.elements[sym].genLevel < 12) {
                            state.elements[sym].count -= cost;
                            state.elements[sym].genLevel += 1;
                            addLog(
                                `🔧 升级：${sym}生成器 → Lv${state.elements[sym].genLevel}（速率 ${getGenRate(sym).toFixed(1)}/秒）`
                                );
                            renderAll();
                        }
                    });
                });
            }

            function renderReactions() {
                let html = '';
                reactionDefs.forEach(def => {
                    const cdRemaining = state.reactions[def.id]?.cooldownRemaining || 0;
                    const cdTotal = getReactionCooldown(def.id);
                    const cdPercent = cdTotal > 0 ? Math.max(0, (1 - cdRemaining / cdTotal) * 100) : 100;
                    const isReacting = flashedReactions[def.id];
                    const ready = cdRemaining <= 0;
                    // 检查前置条件
                    let prereqMet = true;
                    if (def.requireUnlocked) {
                        for (const sym of def.requireUnlocked) {
                            if (!state.elements[sym]?.unlocked) { prereqMet = false; break; }
                        }
                    }
                    const rowClass = isReacting ? 'reacting' : '';
                    html += `
                    <div class="reaction-row ${rowClass}" id="reaction-row-${def.id}">
                        <span style="font-size:0.85rem;">${def.name}</span>
                        <span class="reaction-output">→ ${def.outputCompound} ${compoundDefs[def.outputCompound]?.emoji||''}</span>
                        ${!prereqMet ? '<small style="color:#f87171;">🔒需解锁前置元素</small>' : ''}
                        <div class="cooldown-bar">
                            <div class="fill ${ready ? '' : 'cooling'}" style="width:${cdPercent}%;"></div>
                        </div>
                    </div>`;
                });
                $reactionsList.innerHTML = html;
            }

            function renderCompounds() {
                let html = '';
                let hasAny = false;
                Object.entries(state.compounds).forEach(([cid, count]) => {
                    if (count > 0) hasAny = true;
                    const def = compoundDefs[cid];
                    if (count > 0 || def) {
                        html += `
                        <span class="compound-chip">
                            ${def?.emoji||'🔹'} <span class="formula">${cid}</span>
                            <span class="val">×${formatNumber(count)}</span>
                            <small style="color:#6b8095;">(${def?.scienceValue||0}点/个)</small>
                        </span>`;
                    }
                });
                $compoundsList.innerHTML = html || '<span style="color:#5a7088;">暂无化合物，等待反应触发...</span>';
            }

            function renderResearch() {
                let html = '';
                researchDefs.forEach(def => {
                    const completed = state.researchCompleted.has(def.id);
                    const canAfford = state.sciencePoints >= def.cost && !completed;
                    html += `
                    <div class="research-item ${completed ? 'researched' : ''}">
                        <div class="info">
                            <div class="title">${def.icon||''} ${def.name}</div>
                            <div class="desc">${def.desc}</div>
                        </div>
                        ${completed ?
                            '<span style="color:#4ade80;font-weight:700;">✅ 已研究</span>' :
                            `<button class="btn ${canAfford ? 'accent' : ''}"
                                    data-research="${def.id}"
                                    ${!canAfford ? 'disabled' : ''}>
                                研究 🔬${def.cost}点
                            </button>`
                        }
                    </div>`;
                });
                $researchList.innerHTML = html;

                // 绑定研究按钮
                $researchList.querySelectorAll('button[data-research]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const rid = btn.dataset.research;
                        const def = researchDefs.find(r => r.id === rid);
                        if (!def || state.researchCompleted.has(rid)) return;
                        if (state.sciencePoints >= def.cost) {
                            state.sciencePoints -= def.cost;
                            state.researchCompleted.add(rid);
                            applyResearchEffect(def);
                            addLog(`🔬 研究完成：<span class="highlight">${def.name}</span>`);
                            showToast(`🔬 ${def.name} 研究完成！`);
                            renderAll();
                        }
                    });
                });
            }

            function applyResearchEffect(def) {
                switch (def.effect) {
                    case 'unlock_element':
                        const sym = def.target;
                        if (state.elements[sym]) {
                            state.elements[sym].unlocked = true;
                            state.elements[sym].count = Math.max(state.elements[sym].count, 5);
                            addLog(`✨ 新元素发现：<span class="highlight">${sym}</span>（${elementDefs.find(d=>d.sym===sym)?.name||sym}）已解锁！`);
                            showToast(`✨ 发现新元素：${sym}！`);
                        }
                        break;
                    case 'cooldown_reduction':
                        state.cooldownMultiplier *= (1 - def.value);
                        state.cooldownMultiplier = Math.max(0.15, state.cooldownMultiplier);
                        break;
                    case 'auto_analyze':
                        state.autoAnalyzeRate = 1;
                        break;
                    case 'auto_analyze_upgrade':
                        state.autoAnalyzeRate = 3;
                        break;
                    case 'gen_boost':
                        state.genBoostMultiplier += def.value;
                        break;
                }
            }

            function renderLog() {
                $logArea.innerHTML = state.logLines.slice(0, 30).map(msg =>
                    `<div class="log-entry">${msg}</div>`
                ).join('');
            }

            function renderAll() {
                renderPeriodicTable();
                renderElementStocks();
                renderGenerators();
                renderReactions();
                renderCompounds();
                renderResearch();
                renderLog();
                $sciencePoints.textContent = formatNumber(Math.floor(state.sciencePoints));
                // 应用flash状态
                Object.keys(flashedStocks).forEach(sym => {
                    if (flashedStocks[sym]) {
                        const chip = $elementStocks.querySelector(`[data-sym="${sym}"]`);
                        if (chip) chip.classList.add('flash');
                    }
                });
            }

            function getCatColor(cat) {
                const map = {
                    'nonmetal': '#4ade80',
                    'alkali': '#f87171',
                    'alkaline': '#fb923c',
                    'transition-metal': '#60a5fa',
                    'halogen': '#facc15',
                    'noble': '#c084fc',
                    'metalloid': '#34d399',
                };
                return map[cat] || '#a0b8d0';
            }
            function formatNumber(n) {
                if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
                if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
                if (Number.isInteger(n)) return n.toString();
                return n.toFixed(1);
            }

            // ==================== 游戏循环 ====================
            const TICK_INTERVAL = 500; // 毫秒
            const TICK_SECONDS = TICK_INTERVAL / 1000;

            function gameTick() {
                // 1. 自动生产元素
                Object.keys(state.elements).forEach(sym => {
                    const el = state.elements[sym];
                    if (el.unlocked && el.genLevel > 0) {
                        const rate = getGenRate(sym);
                        el.count += rate * TICK_SECONDS;
                    }
                });

                // 2. 更新反应冷却
                Object.keys(state.reactions).forEach(rid => {
                    if (state.reactions[rid].cooldownRemaining > 0) {
                        state.reactions[rid].cooldownRemaining -= TICK_SECONDS;
                        if (state.reactions[rid].cooldownRemaining < 0) {
                            state.reactions[rid].cooldownRemaining = 0;
                        }
                    }
                });

                // 3. 尝试触发反应（按优先级顺序，每种反应每tick最多触发1次）
                reactionDefs.forEach(def => {
                    if (canTriggerReaction(def.id)) {
                        triggerReaction(def.id);
                    }
                });

                // 4. 自动分析化合物
                if (state.autoAnalyzeRate > 0) {
                    let analyzedThisTick = 0;
                    const maxAnalyze = Math.ceil(state.autoAnalyzeRate * TICK_SECONDS);
                    const compoundEntries = Object.entries(state.compounds).filter(([, c]) => c > 0);
                    // 按价值从低到高排序（优先分析低价值化合物）
                    compoundEntries.sort((a, b) => {
                        const va = compoundDefs[a[0]]?.scienceValue || 0;
                        const vb = compoundDefs[b[0]]?.scienceValue || 0;
                        return va - vb;
                    });
                    for (const [cid, count] of compoundEntries) {
                        if (analyzedThisTick >= maxAnalyze) break;
                        const toAnalyze = Math.min(count, maxAnalyze - analyzedThisTick);
                        if (toAnalyze > 0) {
                            const valPerUnit = compoundDefs[cid]?.scienceValue || 1;
                            state.compounds[cid] -= toAnalyze;
                            state.sciencePoints += toAnalyze * valPerUnit;
                            analyzedThisTick += toAnalyze;
                        }
                    }
                    if (analyzedThisTick > 0) {
                        pulseScienceDisplay();
                    }
                }

                // 5. 渲染更新
                renderAll();
            }

            // ==================== 一键分析 ====================
            $btnAnalyzeAll.addEventListener('click', () => {
                let totalPoints = 0;
                let totalAnalyzed = 0;
                Object.entries(state.compounds).forEach(([cid, count]) => {
                    if (count > 0) {
                        const valPerUnit = compoundDefs[cid]?.scienceValue || 1;
                        totalPoints += count * valPerUnit;
                        totalAnalyzed += count;
                        state.compounds[cid] = 0;
                    }
                });
                if (totalAnalyzed > 0) {
                    state.sciencePoints += totalPoints;
                    addLog(
                        `🧪 一键分析：转化了 <span class="highlight">${totalAnalyzed}</span> 个化合物，获得 <span class="highlight">${totalPoints}</span> 科学点数`);
                    pulseScienceDisplay();
                    showToast(`🧪 获得 ${totalPoints} 科学点数！`);
                    renderAll();
                }
            });

            // ==================== 保存/加载 ====================
            function saveGame() {
                const saveData = {
                    elements: {},
                    compounds: state.compounds,
                    sciencePoints: state.sciencePoints,
                    researchCompleted: Array.from(state.researchCompleted),
                    cooldownMultiplier: state.cooldownMultiplier,
                    genBoostMultiplier: state.genBoostMultiplier,
                    autoAnalyzeRate: state.autoAnalyzeRate,
                    totalReactionsTriggered: state.totalReactionsTriggered,
                    logLines: state.logLines.slice(0, 20),
                };
                Object.keys(state.elements).forEach(sym => {
                    saveData.elements[sym] = {
                        count: state.elements[sym].count,
                        unlocked: state.elements[sym].unlocked,
                        genLevel: state.elements[sym].genLevel,
                    };
                });
                try {
                    localStorage.setItem('chemLabSave', JSON.stringify(saveData));
                } catch (e) { /* ignore */ }
            }
            function loadGame() {
                try {
                    const raw = localStorage.getItem('chemLabSave');
                    if (!raw) return false;
                    const data = JSON.parse(raw);
                    if (data.elements) {
                        Object.keys(data.elements).forEach(sym => {
                            if (state.elements[sym]) {
                                state.elements[sym].count = data.elements[sym].count || 0;
                                state.elements[sym].unlocked = data.elements[sym].unlocked || false;
                                state.elements[sym].genLevel = data.elements[sym].genLevel || 0;
                            }
                        });
                    }
                    if (data.compounds) state.compounds = { ...state.compounds, ...data.compounds };
                    if (data.sciencePoints !== undefined) state.sciencePoints = data.sciencePoints;
                    if (data.researchCompleted) {
                        state.researchCompleted = new Set(data.researchCompleted);
                        // 重新应用研究效果
                        state.cooldownMultiplier = 1.0;
                        state.genBoostMultiplier = 0;
                        state.autoAnalyzeRate = 0;
                        state.researchCompleted.forEach(rid => {
                            const def = researchDefs.find(r => r.id === rid);
                            if (def) applyResearchEffect(def);
                        });
                    }
                    if (data.cooldownMultiplier) state.cooldownMultiplier = data.cooldownMultiplier;
                    if (data.genBoostMultiplier !== undefined) state.genBoostMultiplier = data.genBoostMultiplier;
                    if (data.autoAnalyzeRate !== undefined) state.autoAnalyzeRate = data.autoAnalyzeRate;
                    if (data.totalReactionsTriggered) state.totalReactionsTriggered = data.totalReactionsTriggered;
                    if (data.logLines) state.logLines = data.logLines;
                    addLog('💾 存档已加载。欢迎回到实验室！');
                    return true;
                } catch (e) {
                    return false;
                }
            }

            // ==================== 初始化 ====================
            function init() {
                const loaded = loadGame();
                if (!loaded) {
                    addLog('🟢 实验室初始化完成。基础元素（H, C, N, O）已就绪。');
                    addLog('💡 提示：点击周期表中的元素手动采集，或升级生成器实现自动化。');
                    addLog('💡 当元素满足条件时，化学反应会自动触发。');
                }
                renderAll();
                setInterval(gameTick, TICK_INTERVAL);
                // 每15秒自动保存
                setInterval(saveGame, 15000);
                // 页面关闭时保存
                window.addEventListener('beforeunload', saveGame);
                // 定期清理logLines防止过长
                setInterval(() => {
                    if (state.logLines.length > 40) state.logLines.length = 40;
                }, 30000);
            }

            init();
            console.log('🔬 化学元素自动化实验室已启动！');
            console.log('   - 点击周期表中的元素手动采集');
            console.log('   - 升级生成器实现自动化');
            console.log('   - 等待反应自动触发');
            console.log('   - 用科学点数研究新元素和升级');
            console.log('   💾 游戏每15秒自动保存到浏览器本地存储');
        })();
    </script>
</body>
</html>
